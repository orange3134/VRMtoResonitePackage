name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest

    env:
      PROJECT_NAME: VrmToResonitePackage
      RESONITE_APP_ID: "2519830"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install SteamCMD
        shell: pwsh
        run: |
          $steamcmdDir = Join-Path $env:RUNNER_TEMP "steamcmd"
          New-Item -ItemType Directory -Force $steamcmdDir | Out-Null
          $steamZip = Join-Path $env:RUNNER_TEMP "steamcmd.zip"
          Invoke-WebRequest `
            -Uri "https://steamcdn-a.akamaihd.net/client/installer/steamcmd.zip" `
            -OutFile $steamZip
          Expand-Archive -Path $steamZip -DestinationPath $steamcmdDir -Force
          "STEAMCMD_DIR=$steamcmdDir" >> $env:GITHUB_ENV

      - name: Download Resonite references
        shell: pwsh
        run: |
          $resonitePath = Join-Path $env:RUNNER_TEMP "Resonite"
          & "$env:STEAMCMD_DIR\steamcmd.exe" `
            +force_install_dir "$resonitePath" `
            +login anonymous `
            +app_update $env:RESONITE_APP_ID validate `
            +quit
          "RESONITE_PATH=$resonitePath" >> $env:GITHUB_ENV

      - name: Publish
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:RUNNER_TEMP "publish"
          .\publish.ps1 -ResonitePath $env:RESONITE_PATH -Output $publishDir
          "PUBLISH_DIR=$publishDir" >> $env:GITHUB_ENV

      - name: Package artifact
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME
          $zipPath = Join-Path $env:RUNNER_TEMP "$env:PROJECT_NAME-$version-win-x64.zip"
          Compress-Archive -Path "$env:PUBLISH_DIR\*" -DestinationPath $zipPath -Force
          "RELEASE_ZIP=$zipPath" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $zipPath = $env:RELEASE_ZIP
          $title = "$env:PROJECT_NAME $tag"

          if (gh release view $tag *> $null) {
            gh release upload $tag $zipPath --clobber
          } else {
            gh release create $tag $zipPath `
              --title $title `
              --notes "Automated release for $tag."
          }
